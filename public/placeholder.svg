<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg 
  version="1.1" 
  xmlns="http://www.w3.org/2000/svg" 
  xmlns:xlink="http://www.w3.org/1999/xlink"
  width="1024" 
  height="1024" 
  viewBox="0 0 1024 1024"
  preserveAspectRatio="xMidYMid meet"
>
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2463"/>
      <stop offset="50%" stop-color="#0D3B66"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    
    <!-- Ring Accent Gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#0A2463"/>
    </linearGradient>
    
    <!-- Drop Shadow for Main Circle -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.3"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Drop Shadow for the MTIT Image -->
    <filter id="imageShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.4"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="512" cy="512" r="480" fill="url(#brandGradient)" filter="url(#dropShadow)"/>
  
  <!-- Inner Decorative Ring -->
  <circle cx="512" cy="512" r="440" fill="none" stroke="url(#accentGradient)" stroke-width="8" opacity="0.6"/>
  
  <!-- ==================== MTIT HEADER IMAGE ==================== -->
  <!-- 
    The image is centered at (512, 460) to match the original icon's placement.
    preserveAspectRatio ensures the header scales proportionally within the bounding box.
  -->
  <image 
    xlink:href="https://mtit.bangsamoro.gov.ph/wp-content/uploads/2024/04/MTIT-HEADER-2024.png"
    href="https://mtit.bangsamoro.gov.ph/wp-content/uploads/2024/04/MTIT-HEADER-2024.png"
    x="162" 
    y="310" 
    width="700" 
    height="300" 
    preserveAspectRatio="xMidYMid meet"
    filter="url(#imageShadow)"
  />
  
  <!-- ==================== BRAND TEXT ==================== -->
  
  <!-- Brand Name -->
  <text 
    x="512" 
    y="820" 
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
    font-size="64" 
    font-weight="800" 
    text-anchor="middle" 
    fill="white"
    letter-spacing="-1"
  >
    <tspan x="512" dy="0">ASilva</tspan>
  </text>
  
  <text 
    x="512" 
    y="890" 
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
    font-size="42" 
    font-weight="600" 
    text-anchor="middle" 
    fill="rgba(255,255,255,0.95)"
    letter-spacing="2"
  >
    <tspan x="512" dy="0">Innovations</tspan>
  </text>
  
  <!-- Tagline -->
  <text 
    x="512" 
    y="950" 
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
    font-size="24" 
    font-weight="400" 
    text-anchor="middle" 
    fill="rgba(255,255,255,0.8)"
    letter-spacing="3"
  >
    <tspan x="512" dy="0">TRANSFORMING ORGANIZATIONS</tspan>
  </text>
  
  <!-- ==================== DECORATIVE ELEMENTS ==================== -->
  
  <!-- Dashed Outer Ring -->
  <circle cx="512" cy="512" r="460" fill="none" stroke="white" stroke-width="2" opacity="0.2" stroke-dasharray="15,15"/>
  
  <!-- Corner Accents -->
  <g opacity="0.25">
    <circle cx="180" cy="180" r="20" fill="white"/>
    <circle cx="844" cy="180" r="20" fill="white"/>
    <circle cx="180" cy="844" r="20" fill="white"/>
    <circle cx="844" cy="844" r="20" fill="white"/>
  </g>
  
  <!-- Subtle Top Highlight -->
  <ellipse cx="512" cy="280" rx="200" ry="80" fill="white" opacity="0.05"/>
  
</svg>
